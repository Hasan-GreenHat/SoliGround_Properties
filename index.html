<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SolidGround Properties</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
color:#1e293b;
}

/* Header */

header{
background:linear-gradient(135deg,#0f172a,#1d4ed8);
padding:20px 5%;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:32px;
font-weight:700;
}

.menu{
display:flex;
gap:30px;
}

/* Hero */

.hero{
padding:80px 20px;
text-align:center;
background:linear-gradient(to right,#dbeafe,#eff6ff);
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
margin-bottom:35px;
}

/* Tabs */

.tabs{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:25px;
}

.tab{
background:white;
padding:14px 28px;
border-radius:30px;
cursor:pointer;
font-weight:600;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.active{
background:#1d4ed8;
color:white;
}

/* Search */

.search-box{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

input,select,button{
padding:15px;
border-radius:14px;
border:1px solid #ddd;
}

button{
background:#1d4ed8;
color:white;
border:none;
font-weight:700;
cursor:pointer;
}

/* Properties */

section{
max-width:1200px;
margin:auto;
padding:70px 20px;
}

.section-title{
font-size:38px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.content{
padding:25px;
}

.price{
font-size:30px;
color:#1d4ed8;
font-weight:700;
margin:12px 0;
}

.meta{
display:flex;
gap:18px;
margin-top:15px;
flex-wrap:wrap;
color:#64748b;
}

.contact-btn{
margin-top:20px;
width:100%;
}

/* No results */

.no-results{
display:none;
background:#fee2e2;
color:#b91c1c;
padding:20px;
border-radius:18px;
text-align:center;
font-weight:600;
margin-top:25px;
}

/* Footer */

footer{
background:#0f172a;
color:white;
text-align:center;
padding:30px;
margin-top:70px;
}

  /* =========================
RESPONSIVE DESIGN
========================= */

@media (max-width:1024px){

.hero h1{
font-size:42px;
}

.search-box{
grid-template-columns:1fr 1fr;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

}


/* Tablet */

@media (max-width:768px){

nav{
flex-direction:column;
gap:15px;
text-align:center;
}

.logo{
font-size:26px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.hero{
padding:60px 20px;
}

.hero h1{
font-size:34px;
line-height:1.3;
}

.hero p{
font-size:17px;
}

.tabs{
flex-wrap:wrap;
}

.search-box{
grid-template-columns:1fr;
padding:20px;
}

.grid{
grid-template-columns:1fr;
}

.card{
width:100%;
}

.section-title{
font-size:30px;
text-align:center;
}

input,
select,
button{
font-size:16px;
}

}


/* Mobile */

@media (max-width:480px){

header{
padding:15px;
}

.logo{
font-size:22px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:15px;
}

.tab{
padding:12px 20px;
font-size:14px;
}

.search-box{
border-radius:18px;
}

.card img{
height:220px;
}

.content{
padding:18px;
}

.price{
font-size:24px;
}

.meta{
flex-direction:column;
gap:8px;
}

.contact-btn{
font-size:15px;
padding:14px;
}

footer{
font-size:14px;
padding:20px;
}

}

  #adminDot{

position:fixed;

bottom:15px;

right:15px;

width:12px;

height:12px;

background:#999;

border-radius:50%;

opacity:0.15;

cursor:pointer;

z-index:9999;

transition:0.3s;

}

#adminDot:hover{

opacity:0.8;
transform:scale(1.3);

}

</style>
</head>
<body>


<header>

<nav>

<div class="logo">
SolidGround Properties
</div>

<div class="menu">
<span>Buy</span>
<span>Rent</span>
<span>Commercial</span>
</div>

</nav>

</header>


<div class="hero">

<h1>Find Your Dream Property</h1>

<p>Search nearby areas, apartments, villas and plots</p>


<div class="tabs">

<div class="tab active">Buy</div>

<div class="tab">Rent</div>

<div class="tab">Commercial</div>

</div>


<div class="search-box">

<input id="areaSearch" placeholder="Enter locality (e.g. Gachibowli)">

<select id="typeFilter">
<option value="">Property Type</option>
<option>Villa</option>
<option>Apartment</option>
<option>Plot</option>
</select>

<input id="maxPrice" placeholder="Max Price in Lakhs">

<button onclick="filterProperties()">
Search
</button> <br>

</div>

<div id="noResults" class="no-results">
Properties not available yet in your selected area for sale.
</div>

</div>



<section>

<h2 class="section-title">
Featured Properties
</h2>

<div class="grid" id="propertyGrid"></div>

</section>


<footer>
<div id="adminDot" onclick="openAdmin()"></div>
© 2026 SolidGround Properties

</footer>


<script>

/* ADMIN ONLY LISTINGS (Only you edit here) */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBWiI4R2OCN-k2oNnlazP_abLkIgK_qVZ8",
  authDomain: "sg-properties-8a5e9.firebaseapp.com",
  projectId: "sg-properties-8a5e9",
  storageBucket: "sg-properties-8a5e9.firebasestorage.app",
  messagingSenderId: "928711351217",
  appId: "1:928711351217:web:00d15757ef4d8ad4163b90"
};


const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);
let adminUser="admin";
let adminPass="123456";

async function loadProperties(){

let querySnapshot=
await getDocs(
collection(db,"properties")
);

let properties=[];

querySnapshot.forEach((doc)=>{

properties.push(doc.data());

});

renderProperties(properties);

}

loadProperties();





function renderProperties(list){

let html="";

list.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="content">

<h3>${p.title}</h3>

<p>${p.area}</p>

<div class="price">
₹${p.price} Lakhs
</div>

<div class="meta">

<span>${p.type}</span>

<span>${p.beds} Beds</span>

</div>

<button class="contact-btn"
onclick="contactAgent(
'${p.title}',
'${p.area}',
'${p.price}'
)">
Contact Agent
</button>

</div>

</div>

`;

});

document.getElementById("propertyGrid").innerHTML=html;

}



function filterProperties(){

let area=
document.getElementById("areaSearch")
.value
.toLowerCase();

let type=
document.getElementById("typeFilter")
.value;

let max=
Number(
document.getElementById("maxPrice").value
) || 999999;


let filtered=properties.filter(p=>

p.area.toLowerCase().includes(area)

&& (type=="" || p.type==type)

&& p.price<=max

);


if(filtered.length===0){

document.getElementById(
"propertyGrid"
).innerHTML="";

document.getElementById(
"noResults"
).style.display="block";

}

else{

document.getElementById(
"noResults"
).style.display="none";

renderProperties(filtered);

}

}


renderProperties(properties);

function contactAgent(title,area,price){

let phone="918019671808";

let message=
`Hello, I am interested in this property:

Property: ${title}
Area: ${area}
Price: ₹${price} Lakhs

Please share more details.`;

let url=
"https://wa.me/"
+ phone
+ "?text="
+ encodeURIComponent(message);

window.open(url,"_blank");

}


  let secretClicks=0;

function openAdmin(){

secretClicks++;

if(secretClicks>=5){

window.location.href="admin.html";

}

}

</script>

</body>
</html>
