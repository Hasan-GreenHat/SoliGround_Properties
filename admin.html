<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

.login-box,.dashboard{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.dashboard{
display:none;
}

input,button{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #ddd;
}

button{
background:#1d4ed8;
color:white;
border:none;
}

.property{
background:#eef4ff;
padding:15px;
margin-top:15px;
border-radius:12px;
}

</style>
</head>
<body>

<div class="login-box" id="loginBox">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>



<div class="dashboard" id="dashboard">

<h2>Property Admin Panel</h2>

<input id="title" placeholder="Property Title">

<input id="area" placeholder="Area">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProperty()">
Add Property
</button>


<div id="propertyList"></div>

</div>


<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBWiI4R2OCN-k2oNnlazP_abLkIgK_qVZ8",
  authDomain: "sg-properties-8a5e9.firebaseapp.com",
  projectId: "sg-properties-8a5e9",
  storageBucket: "sg-properties-8a5e9.firebasestorage.app",
  messagingSenderId: "928711351217",
  appId: "1:928711351217:web:00d15757ef4d8ad4163b90"
};


const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);
let adminUser="admin";
let adminPass="123456";

async function loadProperties(){

let querySnapshot=
await getDocs(
collection(db,"properties")
);

let properties=[];

querySnapshot.forEach((doc)=>{

properties.push(doc.data());

});

renderProperties(properties);

}

loadProperties();




</script>

  <script>
    function login(){

if(
user.value===adminUser &&
pass.value===adminPass
){

loginBox.style.display="none";
dashboard.style.display="block";

renderProperties();

}
else{

alert("Wrong Login");

}

}
  </script>
<script>
  

async function addProperty(){

await addDoc(

collection(db,"properties"),

{

title:title.value,

area:area.value,

price:price.value,

image:image.value,

type:"Apartment"

}

);

alert("Property Added Live");

}
renderProperties();

alert("Property Added");





function removeProperty(i){

properties.splice(i,1);

localStorage.setItem(
"properties",
JSON.stringify(properties)
);

renderProperties();

}



function renderProperties(){

let html="";

properties.forEach((p,i)=>{

html+=`

<div class='property'>

<h3>${p.title}</h3>

<p>${p.area}</p>

<p>₹${p.price}</p>

<button onclick='removeProperty(${i})'>
Delete
</button>

</div>

`;

});

propertyList.innerHTML=html;

}
  </script>
</body>
</html>
