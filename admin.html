<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

.login-box,.dashboard{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.dashboard{
display:none;
margin-top:30px;
}

input,button{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #ddd;
}

button{
background:#1d4ed8;
color:white;
border:none;
cursor:pointer;
}

.property{
background:#eef4ff;
padding:15px;
margin-top:15px;
border-radius:12px;
}

</style>
</head>
<body>

<div class="login-box" id="loginBox">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>



<div class="dashboard" id="dashboard">

<h2>Property Admin Panel</h2>

<input id="title" placeholder="Property Title">

<input id="area" placeholder="Area">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProperty()">
Add Property
</button>

<div id="propertyList"></div>

</div>



<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBWiI4R2OCN-k2oNnlazP_abLkIgK_qVZ8",
  authDomain: "sg-properties-8a5e9.firebaseapp.com",
  databaseURL: "https://sg-properties-8a5e9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sg-properties-8a5e9",
  storageBucket: "sg-properties-8a5e9.firebasestorage.app",
  messagingSenderId: "928711351217",
  appId: "1:928711351217:web:00d15757ef4d8ad4163b90"
};


const app=
initializeApp(firebaseConfig);

const db=
getFirestore(app);


/* Make Firebase global */

window.db=db;

window.addDoc=addDoc;

window.getDocs=getDocs;

window.collection=collection;

window.deleteDoc=deleteDoc;

window.doc=doc;

</script>



<!-- NORMAL JAVASCRIPT -->

<script>

let adminUser="admin";

let adminPass="123456";

let properties=[];



function login(){

if(
user.value===adminUser &&
pass.value===adminPass
){

loginBox.style.display="none";

dashboard.style.display="block";

loadProperties();

}
else{

alert("Wrong Login");

}

}




async function addProperty(){

await addDoc(

collection(db,"properties"),

{

title:title.value,

area:area.value,

price:price.value,

image:image.value

}

);

alert("Property Added");

loadProperties();

}




async function loadProperties(){

let snapshot=

await getDocs(
collection(db,"properties")
);

properties=[];

snapshot.forEach((docItem)=>{

properties.push({

id:docItem.id,

...docItem.data()

});

});

renderProperties();

}




function renderProperties(){

let html="";

properties.forEach((p)=>{

html+=`

<div class='property'>

<h3>${p.title}</h3>

<p>${p.area}</p>

<p>₹${p.price}</p>

<img src="${p.image}" width="100%">

<br><br>

<button onclick="deleteProperty('${p.id}')">
Delete
</button>

</div>

`;

});

propertyList.innerHTML=html;

}




async function deleteProperty(id){

await deleteDoc(
doc(db,"properties",id)
);

loadProperties();

}

</script>

</body>
</html>
